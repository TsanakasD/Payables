<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Payables" />
<title>Payables</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424;
    --gold:#e0c97f; --gold2:#c9a84c;
    --text:#f0f0f0; --text2:#aaaaaa; --text3:#666666;
    --border:#2a2a2a; --border2:#3a3a3a;
    --danger:#e05c5c; --danger-bg:#2a1515;
    --success:#5cb87a; --success-bg:#152a1e;
    --radius:12px; --radius-sm:8px;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }
  .app { max-width:480px; margin:0 auto; }
  .app-header { background:var(--bg); border-bottom:0.5px solid var(--border2); padding:20px 16px 0; position:sticky; top:0; z-index:10; }
  .app-title { font-size:24px; font-weight:700; color:var(--gold); letter-spacing:-0.5px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
  .total-pill { font-size:13px; background:var(--danger-bg); color:var(--danger); border:0.5px solid #4a2020; padding:4px 12px; border-radius:20px; font-weight:600; }
  .tabs { display:flex; }
  .tab { flex:1; padding:10px 8px; font-size:13px; font-weight:500; border:none; background:transparent; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; }
  .tab.active { color:var(--gold); border-bottom:2px solid var(--gold); }
  .page { display:none; padding:16px; }
  .page.active { display:block; }
  .add-form { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:14px; margin-bottom:14px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .form-row.three { grid-template-columns:1fr 1fr 1fr; }
  .form-group { display:flex; flex-direction:column; gap:3px; }
  label { font-size:10px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:0.6px; }
  input, select, textarea { width:100%; font-size:14px; padding:9px 10px; border:0.5px solid var(--border2); border-radius:var(--radius-sm); background:var(--bg3); color:var(--text); -webkit-appearance:none; appearance:none; outline:none; font-family:inherit; }
  input:focus, select:focus, textarea:focus { border-color:var(--gold2); }
  textarea { resize:none; height:50px; }
  select option { background:var(--bg3); color:var(--text); }
  .btn-add { width:100%; margin-top:10px; font-size:15px; font-weight:700; background:var(--gold2); color:#0f0f0f; border:none; padding:12px; border-radius:var(--radius-sm); cursor:pointer; }
  .btn-add:active { opacity:0.8; }
  .btn-add:disabled { opacity:0.5; cursor:not-allowed; }
  .loading { text-align:center; color:var(--text3); font-size:13px; padding:2rem 0; }
  .spinner { width:24px; height:24px; border:2px solid var(--border2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .entry { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:13px 14px; margin-bottom:8px; transition:opacity 0.2s; }
  .entry.paid { opacity:0.45; }
  .entry.loading-state { opacity:0.6; pointer-events:none; }
  .entry-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:3px; }
  .entry-name { font-size:16px; font-weight:600; color:var(--text); }
  .entry-amount { font-size:16px; font-weight:700; color:var(--danger); }
  .entry.paid .entry-amount { color:var(--success); text-decoration:line-through; }
  .paid-badge { display:inline-block; font-size:10px; background:var(--success-bg); color:var(--success); border:0.5px solid #2a5a3a; padding:1px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; font-weight:500; }
  .entry-meta { font-size:12px; color:var(--text3); margin-bottom:10px; }
  .entry-actions { display:flex; gap:7px; }
  .btn-sm { font-size:12px; padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer; font-weight:500; background:transparent; }
  .btn-paid { color:var(--success); border:0.5px solid #2a5a3a; background:var(--success-bg); }
  .btn-unpaid { color:var(--text2); border:0.5px solid var(--border2); }
  .btn-del { color:var(--danger); border:0.5px solid #4a2020; background:var(--danger-bg); }
  .btn-edit { font-size:12px; padding:5px 10px; border-radius:var(--radius-sm); cursor:pointer; color:var(--gold2); border:0.5px solid var(--gold2); background:transparent; font-weight:500; }
  .empty { text-align:center; color:var(--text3); font-size:14px; padding:3rem 0; }
  .error-msg { text-align:center; color:var(--danger); font-size:13px; padding:1rem; }
  .report-summary { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
  .stat-card { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:13px 14px; }
  .stat-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; margin-bottom:5px; }
  .stat-value { font-size:22px; font-weight:700; color:var(--text); }
  .stat-value.danger { color:var(--danger); }
  .stat-value.success { color:var(--success); }
  .stat-value.gold { color:var(--gold); }
  .chart-card { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
  .chart-title { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; margin-bottom:12px; }
  .chart-wrap { position:relative; height:220px; }
  .person-card { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:13px 14px; margin-bottom:8px; }
  .person-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
  .person-name { font-size:15px; font-weight:600; color:var(--text); }
  .person-total { font-size:15px; font-weight:700; color:var(--danger); }
  .person-total.zero { color:var(--success); }
  .person-detail { font-size:12px; color:var(--text3); margin-bottom:8px; }
  .person-rows { border-top:0.5px solid var(--border); padding-top:8px; display:flex; flex-direction:column; gap:5px; }
  .person-row { display:flex; justify-content:space-between; font-size:13px; color:var(--text2); }
  .person-row.paid-row { opacity:0.4; text-decoration:line-through; }
  .person-row .row-amt { font-weight:600; color:var(--danger); }
  .person-row.paid-row .row-amt { color:var(--success); }
  .names-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .name-item { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
  .name-item-text { font-size:15px; font-weight:500; color:var(--text); }
  .name-actions { display:flex; gap:6px; }
  .add-name-form { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:14px; }
  .section-title { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; margin-bottom:10px; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:20px; width:90%; max-width:340px; }
  .modal h3 { font-size:16px; color:var(--gold); margin-bottom:14px; }
  .modal input { margin-bottom:12px; }
  .modal-actions { display:flex; gap:8px; }
  .btn-confirm { flex:1; padding:10px; border-radius:var(--radius-sm); background:var(--gold2); color:#0f0f0f; border:none; font-weight:700; cursor:pointer; font-size:14px; }
  .btn-cancel { flex:1; padding:10px; border-radius:var(--radius-sm); background:transparent; color:var(--text2); border:0.5px solid var(--border2); cursor:pointer; font-size:14px; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-title">Payables<span class="total-pill" id="total-badge">€0.00</span></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('entries',this)">📋 Entries</button>
      <button class="tab" onclick="switchTab('report',this)">📊 Report</button>
      <button class="tab" onclick="switchTab('names',this)">👥 Names</button>
    </div>
  </div>

  <div class="page active" id="page-entries">
    <div class="add-form">
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <select id="inp-name"><option value="">Loading...</option></select>
        </div>
        <div class="form-group">
          <label>Amount (€)</label>
          <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal"/>
        </div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>Date</label><input type="date" id="inp-date"/></div>
        <div class="form-group">
          <label>Month</label>
          <select id="inp-month">
            <option value="">—</option>
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div class="form-group"><label>Year</label><input type="number" id="inp-year" placeholder="2026" min="2020" max="2099" inputmode="numeric"/></div>
      </div>
      <div class="form-group"><label>Note</label><textarea id="inp-note" placeholder="optional..."></textarea></div>
      <button class="btn-add" id="btn-add" onclick="addEntry()">+ Add Entry</button>
    </div>
    <div id="list"><div class="loading"><div class="spinner"></div>Loading entries...</div></div>
  </div>

  <div class="page" id="page-report">
    <div class="report-summary">
      <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-value danger" id="r-total">€0.00</div></div>
      <div class="stat-card"><div class="stat-label">Settled</div><div class="stat-value success" id="r-paid">€0.00</div></div>
      <div class="stat-card"><div class="stat-label">People owing</div><div class="stat-value gold" id="r-people">0</div></div>
      <div class="stat-card"><div class="stat-label">Total entries</div><div class="stat-value" id="r-count">0</div></div>
    </div>
    <div class="chart-card"><div class="chart-title">Distribution by person</div><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Amount comparison</div><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
    <div id="report-list"></div>
  </div>

  <div class="page" id="page-names">
    <div class="section-title">People list</div>
    <div class="names-list" id="names-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    <div class="add-name-form">
      <div class="section-title">Add new person</div>
      <div class="form-group" style="margin-bottom:10px"><input type="text" id="inp-new-name" placeholder="e.g. Kostas"/></div>
      <button class="btn-add" onclick="addName()">+ Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit name</h3>
    <input type="text" id="edit-name-input" placeholder="New name"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmEdit()">Save</button>
    </div>
  </div>
</div>

<script>
// SheetDB API — works perfectly on Safari with full CORS support
const API = 'https://sheetdb.io/api/v1/abtacexnru2a8';
// Names stored locally + in sheet "Names"
const NAMES_API = API + '?sheet=Names';

let entries = [], names = [], pieChartInst = null, barChartInst = null, editingOldName = null;
const COLORS = ['#e0c97f','#e05c5c','#5cb87a','#5b9bd5','#d48fd4','#e08c5c','#5ccfcf','#a0a0ff','#f0a0a0','#a0f0c0'];

const h = {'Content-Type':'application/json'};

async function get(url) {
  const r = await fetch(url); return r.json();
}
async function post(url, body) {
  const r = await fetch(url, {method:'POST', headers:h, body:JSON.stringify(body)}); return r.json();
}
async function patch(url, body) {
  const r = await fetch(url, {method:'PATCH', headers:h, body:JSON.stringify(body)});
  const text = await r.text();
  try { return JSON.parse(text); } catch(e) { return {success: r.ok, raw: text}; }
}
async function del(url) {
  const r = await fetch(url, {method:'DELETE', headers:h}); return r.json();
}

const now = new Date();
document.getElementById('inp-date').value = now.toISOString().slice(0,10);
document.getElementById('inp-year').value = now.getFullYear();
document.getElementById('inp-month').selectedIndex = now.getMonth() + 1;

async function init() {
  try {
    await Promise.all([loadNames(), loadEntries()]);
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="error-msg">⚠️ Could not connect. Check your internet connection.</div>';
  }
}

async function loadEntries() {
  try {
    const data = await get(API + '?sheet=Payables');
    entries = (Array.isArray(data) ? data : []).map(r => ({...r, paid: r.paid === 'true' || r.paid === true}));
    // Sort newest first by id
    entries.sort((a,b) => Number(b.id) - Number(a.id));
    renderEntries();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="error-msg">⚠️ Could not load entries.</div>';
  }
}

async function loadNames() {
  try {
    const data = await get(NAMES_API);
    names = (Array.isArray(data) ? data : []).map(r => r.name).filter(Boolean);
    renderNameDropdown();
    renderNamesList();
  } catch(e) {
    names = [];
    renderNameDropdown();
  }
}

function fmt(n) { return '€' + parseFloat(n||0).toFixed(2); }

function renderNameDropdown() {
  const sel = document.getElementById('inp-name');
  const current = sel.value;
  sel.innerHTML = '<option value="">— Select —</option>';
  names.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    if (n === current) o.selected = true;
    sel.appendChild(o);
  });
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'report') renderReport();
}

async function addEntry() {
  const name = document.getElementById('inp-name').value;
  const amount = parseFloat(document.getElementById('inp-amount').value);
  if (!name) { alert('Please select a name.'); return; }
  if (isNaN(amount) || amount <= 0) { alert('Please enter a valid amount.'); return; }
  const btn = document.getElementById('btn-add');
  btn.textContent = 'Saving...'; btn.disabled = true;
  try {
    await post(API + '?sheet=Payables', {
      data: [{
        id: String(Date.now()),
        name, amount: String(amount),
        date: document.getElementById('inp-date').value,
        month: document.getElementById('inp-month').value,
        year: document.getElementById('inp-year').value,
        note: document.getElementById('inp-note').value.trim(),
        paid: 'false'
      }]
    });
    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-note').value = '';
    await loadEntries();
  } catch(e) { alert('Error saving. Please try again.'); }
  btn.textContent = '+ Add Entry'; btn.disabled = false;
}

async function togglePaid(id) {
  const entry = entries.find(e => String(e.id) === String(id));
  if (!entry) return;
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add('loading-state');
  try {
    const newPaid = entry.paid ? 'false' : 'true';
    const res = await patch(API + '/id/' + id + '?sheet=Payables', {data: {paid: newPaid}});
    if (res && res.error) { alert('Server error: ' + res.error); }
    await loadEntries();
  } catch(e) { alert('Error: ' + e.message); if(el) el.classList.remove('loading-state'); }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add('loading-state');
  try {
    await del(API + '/id/' + id + '?sheet=Payables');
    await loadEntries();
  } catch(e) { alert('Error.'); if(el) el.classList.remove('loading-state'); }
}

function renderEntries() {
  const total = entries.filter(e=>!e.paid).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  document.getElementById('total-badge').textContent = fmt(total);
  const list = document.getElementById('list');
  if (!entries.length) { list.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
  list.innerHTML = entries.map(e => {
    const meta = [e.date, e.month, e.year, e.note].filter(Boolean).join(' · ');
    return `<div class="entry${e.paid?' paid':''}" data-id="${e.id}">
      <div class="entry-top">
        <span class="entry-name">${e.name}${e.paid?'<span class="paid-badge">Settled</span>':''}</span>
        <span class="entry-amount">${fmt(e.amount)}</span>
      </div>
      <div class="entry-meta">${meta||'—'}</div>
      <div class="entry-actions">
        <button class="btn-sm ${e.paid?'btn-unpaid':'btn-paid'}" onclick="togglePaid('${e.id}')">${e.paid?'↩ Undo':'✓ Settled'}</button>
        <button class="btn-sm btn-del" onclick="deleteEntry('${e.id}')">✕ Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderReport() {
  const pending = entries.filter(e=>!e.paid);
  const paid = entries.filter(e=>e.paid);
  document.getElementById('r-total').textContent = fmt(pending.reduce((s,e)=>s+parseFloat(e.amount||0),0));
  document.getElementById('r-paid').textContent = fmt(paid.reduce((s,e)=>s+parseFloat(e.amount||0),0));
  document.getElementById('r-count').textContent = entries.length;
  const byName = {};
  entries.forEach(e => { if(!byName[e.name]) byName[e.name]=[]; byName[e.name].push(e); });
  document.getElementById('r-people').textContent = Object.keys(byName).filter(n=>byName[n].some(e=>!e.paid)).length;
  const sorted = Object.entries(byName).map(([name,ents])=>({name,ents,openTotal:ents.filter(e=>!e.paid).reduce((s,e)=>s+parseFloat(e.amount||0),0)})).filter(x=>x.openTotal>0).sort((a,b)=>b.openTotal-a.openTotal);
  if (pieChartInst) pieChartInst.destroy();
  if (sorted.length) {
    pieChartInst = new Chart(document.getElementById('pieChart').getContext('2d'),{type:'doughnut',data:{labels:sorted.map(x=>x.name),datasets:[{data:sorted.map(x=>x.openTotal),backgroundColor:sorted.map((_,i)=>COLORS[i%COLORS.length]),borderColor:'#1a1a1a',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#aaaaaa',font:{size:12},padding:12}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)}`}}}}});
  }
  if (barChartInst) barChartInst.destroy();
  if (sorted.length) {
    barChartInst = new Chart(document.getElementById('barChart').getContext('2d'),{type:'bar',data:{labels:sorted.map(x=>x.name),datasets:[{label:'Outstanding (€)',data:sorted.map(x=>x.openTotal),backgroundColor:sorted.map((_,i)=>COLORS[i%COLORS.length]+'99'),borderColor:sorted.map((_,i)=>COLORS[i%COLORS.length]),borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#aaaaaa'},grid:{color:'#2a2a2a'}},y:{ticks:{color:'#aaaaaa',callback:v=>'€'+v},grid:{color:'#2a2a2a'}}}}});
  }
  const allByName = Object.entries(byName).sort((a,b)=>{const at=a[1].filter(e=>!e.paid).reduce((s,e)=>s+parseFloat(e.amount||0),0);const bt=b[1].filter(e=>!e.paid).reduce((s,e)=>s+parseFloat(e.amount||0),0);return bt-at;});
  document.getElementById('report-list').innerHTML = allByName.map(([name,ents])=>{
    const openTotal=ents.filter(e=>!e.paid).reduce((s,e)=>s+parseFloat(e.amount||0),0);
    const openCount=ents.filter(e=>!e.paid).length;
    const paidCount=ents.filter(e=>e.paid).length;
    return `<div class="person-card"><div class="person-top"><span class="person-name">${name}</span><span class="person-total${openTotal===0?' zero':''}">${fmt(openTotal)}</span></div><div class="person-detail">${openCount} open${paidCount>0?' · '+paidCount+' settled':''}</div><div class="person-rows">${ents.map(e=>`<div class="person-row${e.paid?' paid-row':''}"><span>${[e.date,e.note].filter(Boolean).join(' · ')||'—'}</span><span class="row-amt">${fmt(e.amount)}</span></div>`).join('')}</div></div>`;
  }).join('');
}

function renderNamesList() {
  const container = document.getElementById('names-list');
  if (!names.length) { container.innerHTML = '<div class="empty">No names yet.</div>'; return; }
  container.innerHTML = names.map(n=>`<div class="name-item"><span class="name-item-text">${n}</span><div class="name-actions"><button class="btn-edit" onclick="openEditModal('${n}')">✏️ Edit</button><button class="btn-sm btn-del" onclick="deleteName('${n}')">✕</button></div></div>`).join('');
}

async function addName() {
  const name = document.getElementById('inp-new-name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  if (names.includes(name)) { alert('Name already exists.'); return; }
  try {
    await post(NAMES_API, {data: [{name}]});
    document.getElementById('inp-new-name').value = '';
    await loadNames();
  } catch(e) { alert('Error.'); }
}

async function deleteName(name) {
  if (!confirm(`Delete "${name}"?`)) return;
  try {
    await del(API + '/name/' + encodeURIComponent(name) + '?sheet=Names');
    await loadNames();
  } catch(e) { alert('Error.'); }
}

function openEditModal(name) { editingOldName=name; document.getElementById('edit-name-input').value=name; document.getElementById('edit-modal').classList.add('show'); }
function closeModal() { document.getElementById('edit-modal').classList.remove('show'); editingOldName=null; }
async function confirmEdit() {
  const newName = document.getElementById('edit-name-input').value.trim();
  if (!newName || !editingOldName) return;
  try {
    await patch(API + '/name/' + encodeURIComponent(editingOldName) + '?sheet=Names', {data: {name: newName}});
    closeModal();
    await loadNames();
  } catch(e) { alert('Error.'); }
}

init();
</script>
